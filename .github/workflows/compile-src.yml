name: SWG CI with Discord

on:
  pull_request:
    types:
      - opened
      - synchronize

jobs:
  compile-src:
    runs-on: ubuntu-latest
    container: cekisswg/swg-vm3.01-i386:latest

    steps:
      # 1. Checkout PR
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # 2. Debug: list repo structure
      - name: List repository
        run: |
          echo "Repository structure:"
          ls -R $GITHUB_WORKSPACE

      # 3. Detect SRC directory
      - name: Detect SRC folder
        id: detect_src
        run: |
          if [ -d "$GITHUB_WORKSPACE/src" ]; then
            echo "SRC_PATH=$GITHUB_WORKSPACE/src" >> $GITHUB_ENV
          elif [ -d "$GITHUB_WORKSPACE/SRC/src" ]; then
            echo "SRC_PATH=$GITHUB_WORKSPACE/SRC/src" >> $GITHUB_ENV
          else
            echo "Error: Could not find src folder!"
            exit 1
          fi
          echo "SRC folder detected at $SRC_PATH"

      # 4. Run ANT Build
      - name: Run ANT Build
        id: build
        run: |
          set -e
          BUILD_LOG=$GITHUB_WORKSPACE/build.log
          cd $GITHUB_WORKSPACE
          ant -Dbasedir=$GITHUB_WORKSPACE -Dsrc=$SRC_PATH build_src | tee $BUILD_LOG
          echo "BUILD_EXIT_CODE=${PIPESTATUS[0]}" >> $GITHUB_ENV

      # 5. Send Discord Notification
      - name: Send Discord Notification
        if: always()
        run: |
          STATUS="✅ Success"
          COLOR=3066993
          if [ "${BUILD_EXIT_CODE}" != "0" ]; then
            STATUS="❌ Failed"
            COLOR=15158332
          fi

          # Escape last 10 lines of build log
          BUILD_LOG=$(tail -n 10 $GITHUB_WORKSPACE/build.log | sed 's/"/\\"/g' | sed ':a;N;$!ba;s/\n/\\n/g')

          # Inline JSON payload
          PAYLOAD='{"username":"SWG CI","embeds":[{"title":"SWG CI Build '"$STATUS"'","color":'"$COLOR"',"fields":[{"name":"PR","value":"['"${{ github.event.pull_request.title }}"']('"${{ github.event.pull_request.html_url }}"')","inline":false},{"name":"Author","value":"'"${{ github.event.pull_request.user.login }}"'","inline":true},{"name":"Branch","value":"'"${{ github.event.pull_request.head.ref }}"'","inline":true},{"name":"Commit","value":"'"${{ github.event.pull_request.head.sha }}"'","inline":false},{"name":"Status","value":"'"$STATUS"'","inline":true},{"name":"Last 10 lines of Build Log","value":"'"$BUILD_LOG"'","inline":false}],"footer":{"text":"SWG CI • GitHub Actions"}}]}'

          # Send via curl if available, else fallback to wget
          if command -v curl >/dev/null 2>&1; then
            curl -H "Content-Type: application/json" \
                 -X POST \
                 -d "$PAYLOAD" \
                 https://discord.com/api/webhooks/1462352607015079956/r1jI0LpCUjyvXAbO43a2HUqW1XzZ9y-UdD_13VyyURZdwAghFV_vdZhrAP78CzU5D4RG
          elif command -v wget >/dev/null 2>&1; then
            wget --header="Content-Type: application/json" \
                 --post-data="$PAYLOAD" \
                 https://discord.com/api/webhooks/1462352607015079956/r1jI0LpCUjyvXAbO43a2HUqW1XzZ9y-UdD_13VyyURZdwAghFV_vdZhrAP78CzU5D4RG -O -
          else
            echo "Error: Neither curl nor wget available to send Discord webhook"
          fi
